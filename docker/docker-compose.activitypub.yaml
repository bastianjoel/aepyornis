services:
  ap-db:
    image: postgres:16-alpine
    restart: unless-stopped
    shm_size: 128mb
    ports:
      - 5432:5432
    networks:
      - workout-tracker
    environment:
      POSTGRES_DB: workout_tracker_ap1
      POSTGRES_USER: workout_tracker
      POSTGRES_PASSWORD: workout_tracker
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d $${POSTGRES_DB} -U $${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - ap1-db-data:/var/lib/postgresql/data/
      - ./init/activitypub-shared-db.sql:/docker-entrypoint-initdb.d/01-activitypub-shared-db.sql:ro

  ap-db-init:
    image: postgres:16-alpine
    restart: "no"
    depends_on:
      ap-db:
        condition: service_healthy
    networks:
      - workout-tracker
    environment:
      PGPASSWORD: workout_tracker
    command: >
      sh -ec '
        until pg_isready -h ap-db -U workout_tracker -d workout_tracker_ap1; do sleep 1; done
        if ! psql -h ap-db -U workout_tracker -d postgres -Atc "SELECT datname FROM pg_database" | grep -Fxq workout_tracker_ap2; then
          createdb -h ap-db -U workout_tracker workout_tracker_ap2
        fi
        if ! psql -h ap-db -U workout_tracker -d postgres -Atc "SELECT datname FROM pg_database" | grep -Fxq mastodon; then
          createdb -h ap-db -U workout_tracker mastodon
        fi
      '

  mastodon-redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - workout-tracker
    volumes:
      - mastodon-redis-data:/data

  mastodon-web:
    image: ghcr.io/mastodon/mastodon:v4.3.7
    restart: unless-stopped
    depends_on:
      ap-db:
        condition: service_healthy
      ap-db-init:
        condition: service_completed_successfully
      mastodon-redis:
        condition: service_started
    networks:
      - workout-tracker
    env_file:
      - ./mastodon.activitypub.env.local
    command: bash -c "bundle exec rails db:prepare && bundle exec puma -C config/puma.rb"
    volumes:
      - mastodon-public-system:/mastodon/public/system
      - ap-caddy-data:/caddy-data:ro

  mastodon-streaming:
    image: ghcr.io/mastodon/mastodon:v4.3.7
    restart: unless-stopped
    depends_on:
      ap-db:
        condition: service_healthy
      ap-db-init:
        condition: service_completed_successfully
      mastodon-redis:
        condition: service_started
    networks:
      - workout-tracker
    env_file:
      - ./mastodon.activitypub.env.local
    command: node ./streaming
    volumes:
      - ap-caddy-data:/caddy-data:ro

  mastodon-sidekiq:
    image: ghcr.io/mastodon/mastodon:v4.3.7
    restart: unless-stopped
    depends_on:
      ap-db:
        condition: service_healthy
      ap-db-init:
        condition: service_completed_successfully
      mastodon-redis:
        condition: service_started
    networks:
      - workout-tracker
    env_file:
      - ./mastodon.activitypub.env.local
    command: bundle exec sidekiq
    volumes:
      - mastodon-public-system:/mastodon/public/system
      - ap-caddy-data:/caddy-data:ro

  ap1-workout-tracker:
    build:
      context: ..
      dockerfile: docker/Dockerfile.dev
      target: dev-backend
    restart: unless-stopped
    tty: true
    depends_on:
      ap-db:
        condition: service_healthy
    networks:
      - workout-tracker
    environment:
      WT_JWT_ENCRYPTION_KEY_FILE: /run/secrets/jwt_encryption_key
      WT_DATABASE_DRIVER: postgres
      WT_DSN: host=ap-db user=workout_tracker password=workout_tracker dbname=workout_tracker_ap1 port=5432 sslmode=disable TimeZone=UTC
      WT_ACTIVITY_PUB_ACTIVE: true
      WT_HOST: wt-ap1.test
      SSL_CERT_FILE: /caddy-data/caddy/pki/authorities/local/root.crt
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://127.0.0.1:8080/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 20s
    volumes:
      - ap-asset-volume:/app/assets
      - ap-cache-volume:/root/.cache
      - ../cmd:/app/cmd
      - ../pkg:/app/pkg
      - ../vendor:/app/vendor
      - ../translations:/app/translations
      - ap-caddy-data:/caddy-data:ro
    secrets:
      - jwt_encryption_key

  ap2-workout-tracker:
    build:
      context: ..
      dockerfile: docker/Dockerfile.dev
      target: dev-backend
    restart: unless-stopped
    tty: true
    depends_on:
      ap-db:
        condition: service_healthy
      ap-db-init:
        condition: service_completed_successfully
    networks:
      - workout-tracker
    environment:
      WT_JWT_ENCRYPTION_KEY_FILE: /run/secrets/jwt_encryption_key
      WT_DATABASE_DRIVER: postgres
      WT_DSN: host=ap-db user=workout_tracker password=workout_tracker dbname=workout_tracker_ap2 port=5432 sslmode=disable TimeZone=UTC
      WT_ACTIVITY_PUB_ACTIVE: true
      WT_HOST: wt-ap2.test
      SSL_CERT_FILE: /caddy-data/caddy/pki/authorities/local/root.crt
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://127.0.0.1:8080/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 20s
    volumes:
      - ap-asset-volume:/app/assets
      - ap-cache-volume:/root/.cache
      - ../cmd:/app/cmd
      - ../pkg:/app/pkg
      - ../vendor:/app/vendor
      - ../translations:/app/translations
      - ap-caddy-data:/caddy-data:ro
    secrets:
      - jwt_encryption_key

  ap-edge:
    image: caddy:2.10-alpine
    restart: unless-stopped
    command: >
      sh -ec '
        caddy run --config /etc/caddy/Caddyfile --adapter caddyfile &
        caddy_pid=$$!
        while [ ! -f /data/caddy/pki/authorities/local/root.crt ]; do sleep 1; done
        chmod o+rx /data/caddy/pki /data/caddy/pki/authorities /data/caddy/pki/authorities/local || true
        chmod o+r /data/caddy/pki/authorities/local/root.crt || true
        wait "$${caddy_pid}"
      '
    depends_on:
      ap1-workout-tracker:
        condition: service_started
      ap2-workout-tracker:
        condition: service_started
      ap1-workout-tracker-client:
        condition: service_started
      ap2-workout-tracker-client:
        condition: service_started
      mastodon-web:
        condition: service_started
      mastodon-streaming:
        condition: service_started
    ports:
      - 80:80
      - 443:443
    networks:
      workout-tracker:
        aliases:
          - wt-ap1.test
          - wt-ap2.test
          - mastodon.test
    volumes:
      - ./Caddyfile.activitypub:/etc/caddy/Caddyfile:ro
      - ap-caddy-data:/data
      - ap-caddy-config:/config

  ap1-workout-tracker-client:
    build:
      context: ..
      dockerfile: docker/Dockerfile.dev
      target: dev-frontend
    depends_on:
      - ap1-workout-tracker
    networks:
      - workout-tracker
    volumes:
      - ../client/src:/app/client/src
      - ../client/public:/app/client/public
    tty: true

  ap2-workout-tracker-client:
    build:
      context: ..
      dockerfile: docker/Dockerfile.dev
      target: dev-frontend
    depends_on:
      - ap2-workout-tracker
    networks:
      - workout-tracker
    volumes:
      - ../client/src:/app/client/src
      - ../client/public:/app/client/public
    tty: true

secrets:
  jwt_encryption_key:
    file: ./jwt_encryption_key.txt

volumes:
  ap1-db-data:
  mastodon-redis-data:
  mastodon-public-system:
  ap-asset-volume:
  ap-cache-volume:
  ap-caddy-data:
  ap-caddy-config:

networks:
  workout-tracker:
    external: false

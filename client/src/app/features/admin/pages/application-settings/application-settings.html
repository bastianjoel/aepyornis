@if (error()) {
  <div class="alert alert-danger" role="alert">
    {{ error() }}
  </div>
}

@if (loading()) {
  <div class="text-center py-5">
    <div class="spinner-border text-primary" role="status">
      <span class="visually-hidden">{{ 'Loading' | translate }}</span>
    </div>
  </div>
} @else {
  <div class="card shadow-sm">
    <div class="card-header">
      <h3 class="h5 mb-0">{{ 'Application settings' | translate }}</h3>
    </div>
    <div class="card-body">
      <div class="alert alert-warning mb-4" role="alert">
        {{ 'These settings may be overwritten by:' | translate }}
        <ul class="mb-0 mt-2">
          <li>{{ 'the configuration file' | translate }}</li>
          <li>{{ 'environment variables' | translate }}</li>
        </ul>
      </div>

      <form [formGroup]="configForm" (ngSubmit)="saveConfig()">
        <div class="mb-3 form-check">
          <input
            class="form-check-input"
            formControlName="registration_disabled"
            id="registration_disabled"
            type="checkbox"
          />
          <label class="form-check-label" for="registration_disabled">
            {{ 'Disable account registration' | translate }}
          </label>
        </div>

        <div class="mb-3 form-check">
          <input
            class="form-check-input"
            formControlName="socials_disabled"
            id="socials_disabled"
            type="checkbox"
          />
          <label class="form-check-label" for="socials_disabled">
            {{ 'Disable social sharing buttons' | translate }}
          </label>
        </div>

        <button
          class="btn btn-primary"
          type="submit"
          [disabled]="savingConfig() || configForm.invalid"
        >
          @if (savingConfig()) {
            <span
              aria-hidden="true"
              class="spinner-border spinner-border-sm me-2"
              role="status"
            ></span>
            {{ 'Saving...' | translate }}
          } @else {
            {{ 'Update settings' | translate }}
          }
        </button>
      </form>
    </div>
  </div>
}

<nav class="navbar navbar-expand-lg shadow bg-body">
  <div class="container-fluid">
    @if (userName()) {
      <button
        aria-label="Toggle sidebar"
        class="btn btn-link sidebar-toggle d-inline-flex align-items-center"
        [attr.aria-expanded]="showSidebar()"
        (click)="onToggleSidebar()"
      >
        <app-icon name="menu" size="22px" />
      </button>
    } @else {
      <a class="navbar-brand fw-bold" href="#"> Aepyornis </a>
    }

    @if (userName()) {
      <a
        aria-label="Search profiles"
        class="btn btn-link link-body-emphasis d-inline-flex align-items-center ms-2"
        routerLink="/profiles"
      >
        <app-icon name="search" size="18px" />
      </a>
    }

    <div class="ms-auto">
      <div class="d-flex align-items-center gap-3">
        @if (userName()) {
          <div class="dropdown" ngbDropdown>
            <button
              class="btn btn-sm btn-link link-body-emphasis d-inline-flex align-items-center header-user-menu"
              ngbDropdownToggle
              type="button"
            >
              <app-icon class="me-2" name="user" size="16px" />
              <strong>{{ userName() }}</strong>
            </button>

            <div class="dropdown-menu dropdown-menu-end" ngbDropdownMenu>
              <a class="dropdown-item" routerLink="/profile/settings">
                <app-icon class="me-2" name="settings" size="14px" />
                {{ 'Settings' | translate }}
              </a>
              @if (isAdmin()) {
                <a class="dropdown-item" routerLink="/admin">
                  <app-icon class="me-2" name="admin" size="14px" />
                  {{ 'Admin' | translate }}
                </a>
              }
              <button class="dropdown-item text-danger" type="button" (click)="logout.emit()">
                <app-icon class="me-2" name="logout" size="14px" />
                {{ 'Logout' | translate }}
              </button>
            </div>
          </div>
        }
        @if (!userName()) {
          <div class="d-flex align-items-center">
            <select
              class="form-select form-select-sm"
              id="languageSelect"
              [(ngModel)]="selectedLanguage"
            >
              @for (lang of languages; track lang.code) {
                <option [value]="lang.code">{{ lang.flag }} {{ lang.nativeName }}</option>
              }
            </select>
          </div>
        }
      </div>
    </div>
  </div>
</nav>
